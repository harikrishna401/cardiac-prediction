<!DOCTYPE html>
<html>
<head>
<title>Cardiac Risk Prediction</title>

<style>
body{
font-family: Arial;
background:#f4f6f9;
text-align:center;
}

.container{
background:white;
padding:30px;
margin:50px auto;
width:400px;
border-radius:10px;
box-shadow:0 0 10px gray;
}

input, select{
width:90%;
padding:10px;
margin:5px;
}

button{
background:#007bff;
color:white;
padding:10px 20px;
border:none;
cursor:pointer;
}

.result{
margin-top:20px;
font-weight:bold;
}
</style>
</head>

<body>

<div class="container">
<h2>Cardiac Risk Prediction</h2>

<form method="POST" action="/predict">

<input type="number" name="age" placeholder="Enter Age (e.g., 45)" required>

<select name="gender" required>
<option value="">Select Gender</option>
<option value="1">Male</option>
<option value="0">Female</option>
</select>

<input type="number" name="bp" placeholder="Enter Blood Pressure (e.g., 130)" required>

<select name="diabetes" required>
<option value="">Diabetes? (Yes/No)</option>
<option value="1">Yes</option>
<option value="0">No</option>
</select>

<select name="smoking" required>
<option value="">Smoking? (Yes/No)</option>
<option value="1">Yes</option>
<option value="0">No</option>
</select>

<select name="ecg" required>
<option value="">ECG Result</option>
<option value="1">Abnormal</option>
<option value="0">Normal</option>
</select>

<input type="number" name="chol" placeholder="Enter Cholesterol (e.g., 220)" required>

<br><br>
<button type="submit">Predict Risk</button>

</form>

{% if prediction %}
<div class="result">
<h3>Risk Level: {{ prediction }}</h3>
<p>Probability: {{ probability }}%</p>
<p>Action: {{ action }}</p>
</div>
{% endif %}

</div>

</body>
</html>
